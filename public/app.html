<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tesnet.cwt.swap - Nexus Token Exchange</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-bg: #0a0a0a;
            --secondary-bg: #1a1a1a;
            --accent-green: #00ff00;
            --accent-yellow: #ffff00;
            --accent-red: #ff0000;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #333333;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Courier New', monospace;
            background: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 0, 0.05) 25%, rgba(0, 255, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, 0.05) 75%, rgba(0, 255, 0, 0.05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 0, 0.05) 25%, rgba(0, 255, 0, 0.05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, 0.05) 75%, rgba(0, 255, 0, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 2;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px dashed var(--accent-green);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-green);
            text-transform: uppercase;
        }
        
        .logo span {
            color: var(--accent-yellow);
        }
        
        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .network-badge {
            padding: 8px 12px;
            border: 2px dashed var(--accent-yellow);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .wallet-btn {
            padding: 10px 16px;
            background: transparent;
            border: 2px solid var(--accent-green);
            color: var(--accent-green);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .wallet-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-green);
            transition: left 0.3s ease;
            z-index: -1;
        }
        
        .wallet-btn:hover::before {
            left: 0;
        }
        
        .wallet-btn:hover {
            color: var(--primary-bg);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        
        .wallet-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Main Card */
        .card {
            background: var(--secondary-bg);
            border: 2px dashed var(--accent-green);
            padding: 30px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(0, 255, 0, 0.1), transparent 70%);
            pointer-events: none;
        }
        
        .card-content {
            position: relative;
            z-index: 2;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        /* Wallet Status */
        .wallet-status {
            background: var(--primary-bg);
            border: 1px solid var(--accent-yellow);
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .wallet-status-text {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .wallet-status-address {
            font-size: 14px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: var(--accent-yellow);
            margin-top: 4px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 2px dashed var(--border-color);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tab-btn.active {
            color: var(--accent-green);
            border-bottom-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Swap Section */
        .swap-section {
            margin-bottom: 20px;
        }
        
        .swap-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-yellow);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .token-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: var(--primary-bg);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            position: relative;
        }
        
        .token-selector:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        
        .token-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .token-icon {
            width: 40px;
            height: 40px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: white;
            border: 2px solid;
        }
        
        .token-details h3 {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 2px;
            font-weight: 600;
        }
        
        .token-details p {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .amount-input {
            flex: 1;
            padding: 12px;
            background: var(--primary-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }
        
        .amount-input:focus {
            outline: none;
            border-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        
        .max-btn {
            padding: 10px 14px;
            background: transparent;
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .max-btn:hover {
            background: var(--accent-yellow);
            color: var(--primary-bg);
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.3);
        }
        
        /* Swap Arrow */
        .swap-arrow {
            text-align: center;
            margin: 16px 0;
        }
        
        .swap-arrow button {
            width: 50px;
            height: 50px;
            border-radius: 0;
            background: transparent;
            color: var(--accent-green);
            border: 2px dashed var(--accent-green);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        .swap-arrow button:hover {
            background: var(--accent-green);
            color: var(--primary-bg);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            transform: rotate(180deg);
        }
        
        /* You Receive */
        .you-receive {
            background: var(--primary-bg);
            border: 1px solid var(--accent-yellow);
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .you-receive-label {
            font-size: 11px;
            color: var(--accent-yellow);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .you-receive-amount {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-yellow);
            font-family: 'Courier New', monospace;
        }
        
        /* Buttons */
        .button {
            width: 100%;
            padding: 14px;
            border: 2px solid;
            background: transparent;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .button-primary {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }
        
        .button-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-green);
            transition: left 0.3s ease;
            z-index: -1;
        }
        
        .button-primary:hover::before {
            left: 0;
        }
        
        .button-primary:hover {
            color: var(--primary-bg);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* History */
        .history-item {
            padding: 12px;
            background: var(--primary-bg);
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .history-item:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.1);
        }
        
        .history-info h4 {
            font-size: 13px;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .history-info p {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }
        
        .history-amount {
            text-align: right;
        }
        
        .history-amount p {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-yellow);
            margin-bottom: 4px;
            font-family: 'Courier New', monospace;
        }
        
        .history-amount span {
            font-size: 11px;
            color: var(--accent-green);
            font-family: 'Courier New', monospace;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        /* Status Messages */
        .status {
            padding: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            display: none;
            border: 1px solid;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status.success {
            background: rgba(0, 255, 0, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
            display: block;
        }
        
        .status.error {
            background: rgba(255, 0, 0, 0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
            display: block;
        }
        
        .status.loading {
            background: rgba(255, 255, 0, 0.1);
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
            display: block;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--secondary-bg);
            border: 2px dashed var(--accent-green);
            padding: 24px;
            max-width: 400px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--accent-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--accent-yellow);
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .modal-close:hover {
            color: var(--accent-green);
            transform: rotate(90deg);
        }
        
        .token-option {
            padding: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .token-option:hover {
            background: var(--primary-bg);
            border-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--primary-bg);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-green);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-yellow);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">NEXUS <span>SWAP</span></div>
            <div class="header-right">
                <div class="network-badge">Testnet</div>
                <button class="wallet-btn" id="walletBtn" onclick="connectWallet()">Connect</button>
            </div>
        </div>
        
        <!-- Main Card -->
        <div class="card">
            <div class="card-content">
                <!-- Wallet Status -->
                <div class="wallet-status">
                    <div>
                        <div class="wallet-status-text">Wallet Status</div>
                        <div class="wallet-status-address" id="walletAddress">Not Connected</div>
                    </div>
                </div>
                
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('swap')">Swap</button>
                    <button class="tab-btn" onclick="switchTab('history')">History</button>
                </div>
                
                <!-- Swap Tab -->
                <div id="swap" class="tab-content active">
                    <div id="status" class="status"></div>
                    
                    <!-- From Token -->
                    <div class="swap-section">
                        <div class="swap-label">From</div>
                        <div class="token-selector" onclick="openTokenModal('from')">
                            <div class="token-info">
                                <div class="token-icon" id="fromIcon" style="border-color: #9945FF;">N</div>
                                <div class="token-details">
                                    <h3>Send</h3>
                                    <p id="fromToken">NEX</p>
                                </div>
                            </div>
                            <span style="color: var(--accent-green);">→</span>
                        </div>
                        
                        <div class="input-group">
                            <input type="number" id="fromAmount" class="amount-input" placeholder="0.00" min="0" step="0.01" oninput="updateQuote()">
                            <button class="max-btn" onclick="setMaxAmount()">Max</button>
                        </div>
                    </div>
                    
                    <!-- Swap Arrow -->
                    <div class="swap-arrow">
                        <button onclick="swapTokens()">⇅</button>
                    </div>
                    
                    <!-- To Token -->
                    <div class="swap-section">
                        <div class="swap-label">To</div>
                        <div class="token-selector" onclick="openTokenModal('to')">
                            <div class="token-info">
                                <div class="token-icon" id="toIcon" style="border-color: #627EEA;">E</div>
                                <div class="token-details">
                                    <h3>Receive</h3>
                                    <p id="toToken">ETH</p>
                                </div>
                            </div>
                            <span style="color: var(--accent-green);">→</span>
                        </div>
                    </div>
                    
                    <!-- You Receive -->
                    <div class="you-receive">
                        <div class="you-receive-label">You Receive</div>
                        <div class="you-receive-amount" id="receiveAmount">0.00</div>
                    </div>
                    
                    <!-- Swap Button -->
                    <button class="button button-primary" onclick="executeSwap()" id="swapBtn">Execute Swap</button>
                </div>
                
                <!-- History Tab -->
                <div id="history" class="tab-content">
                    <div id="historyList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Token Selector Modal -->
    <div id="tokenModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeTokenModal()">×</button>
            <div class="modal-header">Select Token</div>
            <div id="tokenList"></div>
        </div>
    </div>
    
    <script>
        const RPC_URL = 'https://testnet.rpc.nexus.xyz';
        const API_URL = 'http://127.0.0.1:3000';
        const CHAIN_ID = 3945;
        const CHAIN_ID_HEX = '0xf69';
        
        const TOKENS = {
            NEX: { name: 'Nexus', color: '#9945FF', icon: 'N' },
            ETH: { name: 'Ethereum', color: '#627EEA', icon: 'E' },
            BTC: { name: 'Bitcoin', color: '#F7931A', icon: 'B' },
            USDC: { name: 'USD Coin', color: '#2775CA', icon: 'U' },
            USDT: { name: 'Tether', color: '#26A17B', icon: 'T' },
            DOGE: { name: 'Dogecoin', color: '#BA9F33', icon: 'D' },
            HYPE: { name: 'Hype', color: '#FF6B6B', icon: 'H' }
        };
        
        let state = {
            fromToken: 'NEX',
            toToken: 'ETH',
            fromAmount: 0,
            toAmount: 0,
            history: [],
            currentModal: null,
            walletConnected: false,
            userAddress: null,
            provider: null
        };
        
        // Initialize
        async function init() {
            loadHistory();
            updateTokenDisplay();
            await autoConnectWallet();
        }
        
        // Auto-connect and switch to Nexus Testnet
        async function autoConnectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // Check current chain
                    const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                    
                    // If not on Nexus testnet, switch or add it
                    if (chainId !== CHAIN_ID_HEX) {
                        try {
                            await window.ethereum.request({
                                method: 'wallet_switchEthereumChain',
                                params: [{ chainId: CHAIN_ID_HEX }]
                            });
                            showStatus('Switched to Nexus Testnet', 'success');
                        } catch (switchError) {
                            if (switchError.code === 4902) {
                                // Chain not added, add it
                                await window.ethereum.request({
                                    method: 'wallet_addEthereumChain',
                                    params: [{
                                        chainId: CHAIN_ID_HEX,
                                        chainName: 'Nexus Testnet',
                                        rpcUrls: [RPC_URL],
                                        blockExplorerUrls: ['https://testnet.explorer.nexus.xyz/']
                                    }]
                                });
                                showStatus('Added Nexus Testnet to wallet', 'success');
                            }
                        }
                    }
                } catch (error) {
                    console.log('Auto-switch info:', error.message);
                }
            }
        }
        
        // Connect Wallet
        async function connectWallet() {
            try {
                if (typeof window.ethereum !== 'undefined') {
                    try {
                        const accounts = await window.ethereum.request({ 
                            method: 'eth_requestAccounts' 
                        });
                        
                        if (accounts && accounts.length > 0) {
                            state.walletConnected = true;
                            state.userAddress = accounts[0];
                            
                            // Auto-switch to Nexus testnet
                            try {
                                await window.ethereum.request({
                                    method: 'wallet_switchEthereumChain',
                                    params: [{ chainId: CHAIN_ID_HEX }]
                                });
                            } catch (switchError) {
                                if (switchError.code === 4902) {
                                    await window.ethereum.request({
                                        method: 'wallet_addEthereumChain',
                                        params: [{
                                            chainId: CHAIN_ID_HEX,
                                            chainName: 'Nexus Testnet',
                                            rpcUrls: [RPC_URL],
                                            blockExplorerUrls: ['https://testnet.explorer.nexus.xyz/']
                                        }]
                                    });
                                }
                            }
                            
                            updateWalletDisplay();
                            showStatus(`Connected: ${state.userAddress.substring(0, 6)}...${state.userAddress.substring(38)}`, 'success');
                        }
                    } catch (error) {
                        if (error.code === 4001) {
                            showStatus('Connection rejected', 'error');
                        } else {
                            throw error;
                        }
                    }
                } else {
                    state.walletConnected = true;
                    state.userAddress = '0x' + Math.random().toString(16).slice(2, 42);
                    updateWalletDisplay();
                    showStatus('Demo wallet connected', 'success');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('Connection error', 'error');
            }
        }
        
        // Update wallet display
        function updateWalletDisplay() {
            const walletBtn = document.getElementById('walletBtn');
            const walletAddress = document.getElementById('walletAddress');
            
            if (state.walletConnected && state.userAddress) {
                walletAddress.textContent = state.userAddress.substring(0, 6) + '...' + state.userAddress.substring(38);
                walletBtn.textContent = 'Disconnect';
                walletBtn.onclick = disconnectWallet;
            } else {
                walletAddress.textContent = 'Not Connected';
                walletBtn.textContent = 'Connect';
                walletBtn.onclick = connectWallet;
            }
        }
        
        // Disconnect Wallet
        function disconnectWallet() {
            state.walletConnected = false;
            state.userAddress = null;
            updateWalletDisplay();
            showStatus('Disconnected', 'success');
        }
        
        // Load history
        function loadHistory() {
            const saved = localStorage.getItem('swapHistory');
            state.history = saved ? JSON.parse(saved) : [];
            renderHistory();
        }
        
        // Save history
        function saveHistory() {
            localStorage.setItem('swapHistory', JSON.stringify(state.history));
        }
        
        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
            
            if (tab === 'history') {
                loadHistory();
            }
        }
        
        // Update quote
        async function updateQuote() {
            const amount = parseFloat(document.getElementById('fromAmount').value) || 0;
            if (amount <= 0) {
                document.getElementById('receiveAmount').textContent = '0.00';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/rate?in=${state.fromToken}&out=${state.toToken}&amount=${amount}`);
                const data = await response.json();
                state.toAmount = data.amount_out;
                document.getElementById('receiveAmount').textContent = data.amount_out.toFixed(2);
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // Swap tokens
        function swapTokens() {
            const temp = state.fromToken;
            state.fromToken = state.toToken;
            state.toToken = temp;
            updateTokenDisplay();
            updateQuote();
        }
        
        // Update token display
        function updateTokenDisplay() {
            document.getElementById('fromToken').textContent = state.fromToken;
            document.getElementById('toToken').textContent = state.toToken;
            
            const fromToken = TOKENS[state.fromToken];
            const toToken = TOKENS[state.toToken];
            
            document.getElementById('fromIcon').style.borderColor = fromToken.color;
            document.getElementById('fromIcon').textContent = fromToken.icon;
            
            document.getElementById('toIcon').style.borderColor = toToken.color;
            document.getElementById('toIcon').textContent = toToken.icon;
        }
        
        // Open token modal
        function openTokenModal(type) {
            state.currentModal = type;
            const tokenList = document.getElementById('tokenList');
            tokenList.innerHTML = '';
            
            Object.entries(TOKENS).forEach(([symbol, token]) => {
                const div = document.createElement('div');
                div.className = 'token-option';
                div.innerHTML = `
                    <div class="token-icon" style="border-color: ${token.color}; width: 40px; height: 40px;">${token.icon}</div>
                    <div>
                        <div style="font-weight: 600; color: var(--text-primary);">${symbol}</div>
                        <div style="font-size: 11px; color: var(--text-secondary);">${token.name}</div>
                    </div>
                `;
                div.onclick = () => selectToken(symbol, type);
                tokenList.appendChild(div);
            });
            
            document.getElementById('tokenModal').classList.add('active');
        }
        
        // Select token
        function selectToken(symbol, type) {
            if (type === 'from') {
                state.fromToken = symbol;
            } else {
                state.toToken = symbol;
            }
            updateTokenDisplay();
            updateQuote();
            closeTokenModal();
        }
        
        // Close token modal
        function closeTokenModal() {
            document.getElementById('tokenModal').classList.remove('active');
        }
        
        // Set max amount
        function setMaxAmount() {
            document.getElementById('fromAmount').value = '100';
            updateQuote();
        }
        
        // Execute swap
        async function executeSwap() {
            if (!state.walletConnected) {
                showStatus('Connect wallet first', 'error');
                return;
            }
            
            const amount = parseFloat(document.getElementById('fromAmount').value);
            
            if (amount <= 0) {
                showStatus('Enter amount', 'error');
                return;
            }
            
            if (state.fromToken === state.toToken) {
                showStatus('Select different tokens', 'error');
                return;
            }
            
            const btn = document.getElementById('swapBtn');
            btn.disabled = true;
            showStatus('Processing...', 'loading');
            
            try {
                const response = await fetch(`${API_URL}/transaction`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        Swap: {
                            account: 0,
                            in_token: state.fromToken,
                            out_token: state.toToken,
                            amount: amount
                        }
                    })
                });
                
                if (response.ok) {
                    const transaction = {
                        id: Date.now(),
                        fromToken: state.fromToken,
                        toToken: state.toToken,
                        fromAmount: amount,
                        toAmount: state.toAmount,
                        timestamp: new Date().toLocaleString(),
                        status: 'success',
                        wallet: state.userAddress
                    };
                    
                    state.history.unshift(transaction);
                    saveHistory();
                    
                    showStatus(`Swap successful! +${state.toAmount.toFixed(2)} ${state.toToken}`, 'success');
                    document.getElementById('fromAmount').value = '';
                    document.getElementById('receiveAmount').textContent = '0.00';
                } else {
                    showStatus('Swap failed', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('Error executing swap', 'error');
            } finally {
                btn.disabled = false;
            }
        }
        
        // Show status
        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            
            if (type !== 'loading') {
                setTimeout(() => {
                    statusEl.className = 'status';
                }, 5000);
            }
        }
        
        // Render history
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            
            if (state.history.length === 0) {
                historyList.innerHTML = '<div class="empty-state"><p>No transactions</p></div>';
                return;
            }
            
            historyList.innerHTML = state.history.map(tx => `
                <div class="history-item">
                    <div class="history-info">
                        <h4>${tx.fromToken} → ${tx.toToken}</h4>
                        <p>${tx.timestamp}</p>
                        <p>${tx.wallet ? tx.wallet.substring(0, 10) + '...' : 'Unknown'}</p>
                    </div>
                    <div class="history-amount">
                        <p>-${tx.fromAmount.toFixed(2)}</p>
                        <span>+${tx.toAmount.toFixed(2)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // Close modal on outside click
        document.getElementById('tokenModal').addEventListener('click', (e) => {
            if (e.target.id === 'tokenModal') {
                closeTokenModal();
            }
        });
        
        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
