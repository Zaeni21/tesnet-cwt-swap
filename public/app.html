<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tesnet.cwt.swap - App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #333333;
    --border2: #4a4a4a;
    --accent: #00ff00;
    --accent2: #bdff00;
    --green: #00ff00;
    --red: #ff5c5c;
    --text: #ffffff;
    --muted: #8a8a8a;
    --muted2: #b0b0b0;
    --mono: 'Space Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(0deg, transparent 24%, rgba(0, 255, 0, 0.03) 25%, rgba(0, 255, 0, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, 0.03) 75%, rgba(0, 255, 0, 0.03) 76%, transparent 77%, transparent),
      linear-gradient(90deg, transparent 24%, rgba(0, 255, 0, 0.03) 25%, rgba(0, 255, 0, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 255, 0, 0.03) 75%, rgba(0, 255, 0, 0.03) 76%, transparent 77%, transparent);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.95);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(8px);
  }
  .logo {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .testnet-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--green);
    border: 1px solid var(--green);
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }
  #connectBtn {
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  #connectBtn:hover {
    background: var(--accent);
    color: var(--bg);
    opacity: 1;
    transform: translateY(-1px);
  }
  #connectBtn.connected {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--green);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  /* MAIN */
  main {
    flex: 1;
    width: 100%;
    max-width: 560px;
    padding: 32px 16px 60px;
    position: relative;
    z-index: 1;
  }

  /* STATUS BAR */
  #statusBar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted2);
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 16px;
    gap: 4px;
  }
  .tab {
    flex: 1;
    padding: 9px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
  }

  /* SWAP CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  /* TOKEN BOX */
  .token-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .token-box:hover { border-color: var(--border2); }
  .token-box-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .token-row { display: flex; align-items: center; gap: 12px; }
  .token-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 50px;
    padding: 8px 14px 8px 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .token-btn:hover { border-color: var(--accent); background: rgba(79,110,247,0.07); }
  .token-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .token-btn span.token-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .token-btn .chevron { color: var(--muted); font-size: 10px; }

  .amount-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    text-align: right;
    width: 0;
    min-width: 0;
  }
  .amount-input::placeholder { color: var(--muted); }
  .amount-input::-webkit-outer-spin-button,
  .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .token-sub {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
  }
  .token-usd { font-size: 12px; color: var(--muted); }
  .max-btn {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: rgba(79,110,247,0.1);
    padding: 3px 8px;
    border-radius: 4px;
  }
  .max-btn:hover { background: rgba(79,110,247,0.2); }

  /* SWAP ARROW */
  .swap-arrow-wrap {
    display: flex;
    justify-content: center;
    margin: 10px 0;
    position: relative;
  }
  #swapArrow {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted2);
    font-size: 16px;
    transition: all 0.2s;
    user-select: none;
  }
  #swapArrow:hover { border-color: var(--accent); color: var(--accent); transform: rotate(180deg); }

  /* RATE INFO */
  #rateInfo {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    margin: 14px 0;
    font-size: 13px;
    min-height: 42px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .rate-row { display: flex; justify-content: space-between; align-items: center; }
  .rate-label { color: var(--muted); }
  .rate-val { font-family: var(--mono); font-size: 12px; color: var(--muted2); }
  .rate-val.highlight { color: var(--text); }

  /* SWAP BUTTON */
  #swapBtn {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: var(--sans);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
    letter-spacing: 0.3px;
    margin-top: 6px;
  }
  #swapBtn:disabled {
    background: var(--surface2);
    color: var(--muted);
    cursor: not-allowed;
    border: 1px solid var(--border);
  }
  #swapBtn:not(:disabled):hover {
    opacity: 1;
    transform: translateY(-1px);
    background: var(--accent);
    color: var(--bg);
  }
  #swapBtn:not(:disabled):active { transform: scale(0.99); }

  /* TOKEN MODAL */
  #tokenModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #tokenModal.open { display: flex; }
  .modal-sheet {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-close {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--muted2);
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .token-list { overflow-y: auto; flex: 1; }
  .token-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .token-item:hover { background: var(--surface2); }
  .token-item.selected { background: rgba(79,110,247,0.1); border: 1px solid rgba(79,110,247,0.3); }
  .token-item-info { flex: 1; }
  .token-item-name { font-weight: 600; font-size: 14px; }
  .token-item-full { font-size: 12px; color: var(--muted); }
  .token-item-bal { font-family: var(--mono); font-size: 13px; color: var(--muted2); }

  /* CONFIRM MODAL */
  #confirmModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1001;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    padding: 16px;
  }
  #confirmModal.open { display: flex; }
  .confirm-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 380px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  .confirm-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .confirm-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .confirm-row:last-of-type { border-bottom: none; }
  .confirm-row .label { color: var(--muted); }
  .confirm-row .val { font-family: var(--mono); font-weight: 700; }
  .confirm-row .val.green { color: var(--green); }
  .confirm-btns { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 13px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--muted2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--border); }
  .btn-confirm {
    flex: 1; padding: 13px;
    background: transparent;
    border: 2px solid var(--accent);
    border-radius: 10px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .btn-confirm:hover { background: var(--accent); color: var(--bg); }

  /* HISTORY */
  #historyPanel { display: none; }
  #historyPanel.active { display: block; }
  .hist-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .hist-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(79,110,247,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .hist-main { flex: 1; }
  .hist-tokens { font-size: 14px; font-weight: 600; }
  .hist-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .hist-amount { text-align: right; font-family: var(--mono); font-size: 13px; }
  .hist-out { color: var(--green); }
  .hist-in { color: var(--muted); font-size: 11px; }
  .hist-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(34,211,160,0.15);
    color: var(--green);
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 9999;
    white-space: nowrap;
    max-width: 90vw;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { border-color: var(--green); color: var(--green); }
  #toast.error { border-color: var(--red); color: var(--red); }

  /* SPINNER */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SLIPPAGE */
  .slippage-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .slippage-label { font-size: 12px; color: var(--muted); flex: 1; }
  .slip-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted2);
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }
  .slip-btn.active, .slip-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,110,247,0.08); }
</style>
</head>
<body>

<nav>
  <div class="logo">tesnet.<span style="color:var(--accent2)">cwt</span>.swap</div>
  <div class="nav-right">
    <div class="testnet-badge">TESTNET</div>
    <button id="connectBtn" onclick="toggleConnect()">Connect Wallet</button>
  </div>
</nav>

<main>
  <div id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connect your wallet to start swapping</span>
  </div>

  <div class="tabs">
    <div class="tab active" id="tabSwap" onclick="showTab('swap')">Swap</div>
    <div class="tab" id="tabHistory" onclick="showTab('history')">History</div>
  </div>

  <!-- SWAP PANEL -->
  <div id="swapPanel">
    <div class="card">
      <!-- FROM -->
      <div class="token-box">
        <div class="token-box-label">Send</div>
        <div class="token-row">
          <button class="token-btn" onclick="openModal('from')">
            <div class="token-icon" id="fromIcon"></div>
            <span class="token-name" id="fromName"></span>
            <span class="chevron">▼</span>
          </button>
          <input class="amount-input" id="fromAmount" type="number" placeholder="0.00" oninput="onAmountInput()" />
        </div>
        <div class="token-sub">
          <span class="token-usd" id="fromUSD">≈ $0.00</span>
          <span class="max-btn" onclick="setMax()">MAX</span>
        </div>
      </div>

      <!-- ARROW -->
      <div class="swap-arrow-wrap">
        <div id="swapArrow" onclick="flipTokens()">⇅</div>
      </div>

      <!-- TO -->
      <div class="token-box">
        <div class="token-box-label">Receive</div>
        <div class="token-row">
          <button class="token-btn" onclick="openModal('to')">
            <div class="token-icon" id="toIcon"></div>
            <span class="token-name" id="toName"></span>
            <span class="chevron">▼</span>
          </button>
          <input class="amount-input" id="toAmount" readonly placeholder="0.00" style="color:var(--green)" />
        </div>
        <div class="token-sub">
          <span class="token-usd" id="toUSD">≈ $0.00</span>
        </div>
      </div>

      <!-- RATE INFO -->
      <div id="rateInfo">
        <div class="rate-row">
          <span class="rate-label">Exchange Rate</span>
          <span class="rate-val" id="rateDisplay">—</span>
        </div>
        <div class="rate-row">
          <span class="rate-label">Price Impact</span>
          <span class="rate-val" id="impactDisplay">—</span>
        </div>
        <div class="rate-row">
          <span class="rate-label">Min. Received</span>
          <span class="rate-val" id="minReceived">—</span>
        </div>
      </div>

      <!-- SLIPPAGE -->
      <div class="slippage-row">
        <span class="slippage-label">Slippage Tolerance</span>
        <button class="slip-btn active" id="slip05" onclick="setSlippage(0.5)">0.5%</button>
        <button class="slip-btn" id="slip1" onclick="setSlippage(1)">1%</button>
        <button class="slip-btn" id="slip3" onclick="setSlippage(3)">3%</button>
      </div>

      <button id="swapBtn" disabled onclick="openConfirm()">Connect Wallet</button>
    </div>
  </div>

  <!-- HISTORY PANEL -->
  <div id="historyPanel">
    <div id="historyList"></div>
  </div>
</main>

<!-- TOKEN MODAL -->
<div id="tokenModal">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">Select Token</div>
      <div class="modal-close" onclick="closeModal()">×</div>
    </div>
    <div class="token-list" id="tokenList"></div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal">
  <div class="confirm-card">
    <div class="confirm-title">Confirm Swap</div>
    <div class="confirm-row"><span class="label">You Send</span><span class="val" id="cfSend"></span></div>
    <div class="confirm-row"><span class="label">You Receive</span><span class="val green" id="cfReceive"></span></div>
    <div class="confirm-row"><span class="label">Exchange Rate</span><span class="val" id="cfRate" style="font-size:12px;color:var(--muted2)"></span></div>
    <div class="confirm-row"><span class="label">Price Impact</span><span class="val" id="cfImpact" style="font-size:12px;color:var(--muted2)"></span></div>
    <div class="confirm-row"><span class="label">Slippage</span><span class="val" id="cfSlippage" style="font-size:12px;color:var(--muted2)"></span></div>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm" id="confirmExecBtn" onclick="executeSwap()">Confirm Swap</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONTRACT CONFIG ────────────────────────────────────────────────────────────
const SWAP_ROUTER = '0xAc354bF77c25e036f7F9A16285f5cD868dBe7bDd';

const TOKEN_ADDRESSES = {
  ETH:  '0x6afaAad5aE59698fC3b20B67c0fD6549efcaE39A',
  BTC:  '0x3eC542a8Dc12Fed02a645d9DD14950594Bf31a8b',
  USDC: '0x9586d069a180823D7386cEf01Ec232c7E74F9538',
  USDT: '0xf88baD145FE915F3cFB6f62b3fd3fe7Ce9eEd91d',
  DOGE: '0x476bF1510AD9cCbf9F4c05fE7E05a3Ce59Cb11Bc',
  HYPE: '0x72eAd33588f911422C6Ecb14f39F133Ed20aE1Bf',
  USDX: '0x9658B23835BCc7E16d4CaE49a14167547dE54130',
  NEX:  '0x0000000000000000000000000000000000000000', // native coin via zero address
};

const ROUTER_ABI = [
  {

// ABI encode helper (manual, no ethers dependency)
function encodeABI(funcSig, types, values) {
  const selector = keccak256Selector(funcSig);
  let encoded = selector;
  for (let i = 0; i < types.length; i++) {
    if (types[i] === 'address') {
      encoded += values[i].toLowerCase().replace('0x','').padStart(64, '0');
    } else if (types[i] === 'uint256') {
      encoded += BigInt(values[i]).toString(16).padStart(64, '0');
    }
  }
  return encoded;
}

function keccak256Selector(sig) {
  // Use ethereum's method: first 4 bytes of keccak256
  // We'll use a precomputed approach via subtle crypto
  // Fallback: use eth_call with method id
  const sigs = {
    'approve(address,uint256)':                          '0x095ea7b3',
    'allowance(address,address)':                        '0xdd62ed3e',
    'balanceOf(address)':                                '0x70a08231',
    'swap(address,address,uint256)':                     '0xdf791e50',
    'swapNative(address)':                               '0x8816c65f',
    'calculateSwapAmount(address,address,uint256)':      '0x9b4e5b80',
  };
  return sigs[sig] || null;
}

function encodeAddress(addr) {
  return addr.toLowerCase().replace('0x','').padStart(64,'0');
}
function encodeUint256(val) {
  return BigInt(val).toString(16).padStart(64,'0');
}

function buildCallData(funcSig, ...args) {
  const sel = keccak256Selector(funcSig);
  if (!sel) throw new Error('Unknown function sig: ' + funcSig);
  let data = sel;
  for (const arg of args) {
    if (typeof arg === 'string' && arg.startsWith('0x')) {
      data += encodeAddress(arg);
    } else {
      data += encodeUint256(arg);
    }
  }
  return data;
}

async function ethCall(to, data) {
  const result = await window.ethereum.request({
    method: 'eth_call',
    params: [{ to, data }, 'latest'],
  });
  return result;
}

async function sendTx(to, data) {
  const txHash = await window.ethereum.request({
    method: 'eth_sendTransaction',
    params: [{ from: walletAddress, to, data }],
  });
  return txHash;
}

async function waitForTx(txHash) {
  for (let i = 0; i < 60; i++) {
    await new Promise(r => setTimeout(r, 2000));
    const receipt = await window.ethereum.request({
      method: 'eth_getTransactionReceipt',
      params: [txHash],
    });
    if (receipt) return receipt;
  }
  throw new Error('Transaction timeout');
}

function getPool(a, b) {
  const key1 = a + '-' + b;
  const key2 = b + '-' + a;
  if (pools[key1]) return { pool: pools[key1], reversed: false };
  if (pools[key2]) return { pool: pools[key2], reversed: true };
  return null;
}

function ammGetOut(amountIn, rIn, rOut) {
  const amtInWithFee = amountIn * (1 - FEE);
  return (amtInWithFee * rOut) / (rIn + amtInWithFee);
}

function getRoute(from, to, amount) {
  // Direct route
  const direct = getPool(from, to);
  if (direct) {
    const { pool, reversed } = direct;
    const rIn  = reversed ? pool.rB : pool.rA;
    const rOut = reversed ? pool.rA : pool.rB;
    const out = ammGetOut(amount, rIn, rOut);
    const spotPrice = rOut / rIn;
    const executionPrice = out / amount;
    const impact = Math.abs((spotPrice - executionPrice) / spotPrice) * 100;
    return { out, impact, route: [from, to] };
  }
  // Route via NEX or USDC as intermediate
  for (const mid of ['NEX', 'USDC', 'ETH']) {
    if (mid === from || mid === to) continue;
    const leg1 = getPool(from, mid);
    const leg2 = getPool(mid, to);
    if (leg1 && leg2) {
      const { pool: p1, reversed: r1 } = leg1;
      const { pool: p2, reversed: r2 } = leg2;
      const out1 = ammGetOut(amount, r1 ? p1.rB : p1.rA, r1 ? p1.rA : p1.rB);
      const out2 = ammGetOut(out1,   r2 ? p2.rB : p2.rA, r2 ? p2.rA : p2.rB);
      const spotPrice = (TOKENS[from].usdPrice / TOKENS[to].usdPrice);
      const executionPrice = out2 / amount;
      const impact = Math.abs((spotPrice - executionPrice) / spotPrice) * 100;
      return { out: out2, impact, route: [from, mid, to] };
    }
  }
  return null;
}

function fmt(n, decimals) {
  if (!n || isNaN(n)) return '0.00';
  if (n < 0.001) return n.toExponential(4);
  return parseFloat(n.toFixed(decimals !== undefined ? decimals : 6)).toString();
}

function fmtUSD(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function updateRate() {
  const amtRaw = parseFloat(document.getElementById('fromAmount').value);
  const fromUSD = document.getElementById('fromUSD');
  const toUSD = document.getElementById('toUSD');
  const toAmtInput = document.getElementById('toAmount');
  const rateDisp = document.getElementById('rateDisplay');
  const impactDisp = document.getElementById('impactDisplay');
  const minRecv = document.getElementById('minReceived');

  if (!amtRaw || amtRaw <= 0) {
    toAmtInput.value = '';
    fromUSD.textContent = '≈ $0.00';
    toUSD.textContent = '≈ $0.00';
    rateDisp.textContent = '—';
    impactDisp.textContent = '—';
    minRecv.textContent = '—';
    updateSwapBtn();
    return;
  }

  fromUSD.textContent = '≈ ' + fmtUSD(amtRaw * TOKENS[fromToken].usdPrice);

  if (fromToken === toToken) {
    toAmtInput.value = '';
    rateDisp.textContent = 'Same token!';
    impactDisp.textContent = '—';
    minRecv.textContent = '—';
    toUSD.textContent = '≈ $0.00';
    updateSwapBtn();
    return;
  }

  const result = getRoute(fromToken, toToken, amtRaw);
  if (!result) {
    toAmtInput.value = '';
    rateDisp.textContent = 'No route found';
    impactDisp.textContent = '—';
    minRecv.textContent = '—';
    toUSD.textContent = '≈ $0.00';
    updateSwapBtn();
    return;
  }

  const { out, impact } = result;
  toAmtInput.value = fmt(out);
  toUSD.textContent = '≈ ' + fmtUSD(out * TOKENS[toToken].usdPrice);

  const rate = out / amtRaw;
  rateDisp.textContent = `1 ${fromToken} = ${fmt(rate)} ${toToken}`;
  rateDisp.classList.add('highlight');

  const impactColor = impact > 3 ? 'var(--red)' : impact > 1 ? '#f0b429' : 'var(--green)';
  impactDisp.innerHTML = `<span style="color:${impactColor}">${fmt(impact, 3)}%</span>`;

  const minOut = out * (1 - slippage / 100);
  minRecv.textContent = `${fmt(minOut)} ${toToken}`;

  updateSwapBtn();
}

async function executeSwap() {
  const btn = document.getElementById('confirmExecBtn');
  const amt = parseFloat(document.getElementById('fromAmount').value);
  const out = parseFloat(document.getElementById('toAmount').value);
  if (!amt || !out) return;

  // If no real wallet, fallback to demo mode
  if (!window.ethereum || !walletAddress) {
    executeDemoSwap(amt, out);
    return;
  }

  const tokenFromAddr = TOKEN_ADDRESSES[fromToken];
  const tokenToAddr   = TOKEN_ADDRESSES[toToken];

  const ZERO_ADDR = '0x0000000000000000000000000000000000000000';
  const isNativeFrom = tokenFromAddr === ZERO_ADDR;

  btn.disabled = true;

  try {
    // Convert amount to wei (18 decimals)
    const amountWei = BigInt(Math.floor(amt * 1e18));

    // STEP 1: Approve if ERC-20 (skip if native NEX)
    if (!isNativeFrom) {
      btn.innerHTML = '<span class="spinner"></span>Checking allowance...';
      const allowanceData = buildCallData('allowance(address,address)', walletAddress, SWAP_ROUTER);
      const allowanceHex  = await ethCall(tokenFromAddr, allowanceData);
      const currentAllowance = BigInt(allowanceHex || '0x0');

      if (currentAllowance < amountWei) {
        btn.innerHTML = '<span class="spinner"></span>Approving token...';
        showToast(`Approve ${fromToken} in your wallet`, '');

        const MAX_UINT = '0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';
        const approveData = buildCallData('approve(address,uint256)', SWAP_ROUTER, BigInt(MAX_UINT));
        const approveTxHash = await sendTx(tokenFromAddr, approveData);

        btn.innerHTML = '<span class="spinner"></span>Waiting approve...';
        showToast('Waiting approve confirmation...', '');
        const approveReceipt = await waitForTx(approveTxHash);
        if (approveReceipt.status !== '0x1') throw new Error('Approve transaction failed');
        showToast('Approved! Now swapping...', '');
      }
    }

    // STEP 2: Execute swap
    btn.innerHTML = '<span class="spinner"></span>Confirm swap in wallet...';

    let swapTxHash;
    if (isNativeFrom) {
      // Native NEX → ERC20: call swapNative(tokenTo) with msg.value
      const swapData = buildCallData('swapNative(address)', tokenToAddr);
      swapTxHash = await window.ethereum.request({
        method: 'eth_sendTransaction',
        params: [{ from: walletAddress, to: SWAP_ROUTER, data: swapData, value: '0x' + amountWei.toString(16) }],
      });
    } else {
      // ERC20 → ERC20/native: call swap(tokenFrom, tokenTo, amount)
      const swapData = buildCallData('swap(address,address,uint256)', tokenFromAddr, tokenToAddr, amountWei);
      swapTxHash = await window.ethereum.request({
        method: 'eth_sendTransaction',
        params: [{ from: walletAddress, to: SWAP_ROUTER, data: swapData }],
      });
    }

    btn.innerHTML = '<span class="spinner"></span>Waiting confirmation...';
    showToast('Swap submitted, waiting...', '');
    const receipt = await waitForTx(swapTxHash);

    if (receipt.status !== '0x1') throw new Error('Swap transaction reverted');

    // ── STEP 4: Save to history & update UI ───────────────────────────────────
    // Also update local AMM state for UI consistency
    const result = getRoute(fromToken, toToken, amt);
    if (result) {
      const direct = getPool(fromToken, toToken);
      if (direct) {
        const { pool, reversed } = direct;
        if (!reversed) { pool.rA += amt * (1 - FEE); pool.rB -= out; }
        else            { pool.rB += amt * (1 - FEE); pool.rA -= out; }
      }
    }
    balances[fromToken] -= amt;
    balances[toToken]   += out;

    const tx = {
      id: Date.now(),
      from: fromToken,
      to: toToken,
      amtIn: amt,
      amtOut: out,
      time: new Date().toISOString(),
      txHash: swapTxHash,
    };
    txHistory.unshift(tx);
    localStorage.setItem('nexus_history', JSON.stringify(txHistory.slice(0, 50)));

    document.getElementById('fromAmount').value = '';
    document.getElementById('toAmount').value   = '';
    closeConfirm();
    btn.innerHTML = 'Confirm Swap';
    btn.disabled  = false;
    updateRate();
    showToast(`✓ Swapped ${fmt(amt)} ${fromToken} → ${fmt(out)} ${toToken}`, 'success');

  } catch (err) {
    btn.innerHTML = 'Confirm Swap';
    btn.disabled  = false;
    const msg = err?.message || 'Transaction failed';
    if (msg.includes('rejected') || msg.includes('denied') || msg.includes('4001')) {
      showToast('Transaction rejected by user', 'error');
    } else {
      showToast(msg.length > 60 ? msg.slice(0, 60) + '...' : msg, 'error');
    }
  }
}

  // Try MetaMask first
  if (window.ethereum) {

      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      const addr = accounts[0];
      walletAddress = addr;

      // Try to switch/add Nexus Testnet (chainId 3945 = 0xF69)
      try {
        await window.ethereum.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: '0xF69' }],
        });
      } catch (switchErr) {
        if (switchErr.code === 4902) {
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{
              chainId: '0xF69',
              chainName: 'Nexus Testnet',
              nativeCurrency: { name: 'NEX', symbol: 'NEX', decimals: 18 },
              rpcUrls: ['https://rpc.testnet.nexus.xyz'],
              blockExplorerUrls: ['https://explorer.testnet.nexus.xyz'],
            }],
          });
        }
      }

      connectWallet(addr.substr(0,6) + '...' + addr.substr(-4));
    } catch (e) {
      showToast('Connection rejected', 'error');
    }
  } else {
    // Simulate connect for demo
    walletAddress = null;
    connectWallet('0xDemo...SWAP');
    showToast('Demo mode: No wallet detected', '');
  }
}

function connectWallet(label) {
  walletConnected = true;
  document.getElementById('connectBtn').textContent = label;
  document.getElementById('connectBtn').classList.add('connected');
  document.getElementById('statusDot').classList.add('connected');
  document.getElementById('statusText').textContent = 'Connected to Nexus Testnet · AMM active';
  updateSwapBtn();
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (type || '');
  setTimeout(() => { t.className = ''; }, 3500);
}

// ── INIT ───────────────────────────────────────────────────────────────────────
renderTokenBtn('from');
renderTokenBtn('to');
updateRate();
updateSwapBtn();

// Close modal on backdrop click
document.getElementById('tokenModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('confirmModal').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});
</script>
